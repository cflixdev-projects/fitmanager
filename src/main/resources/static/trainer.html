<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FitManager - Trainer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>FitManager - Traineransicht</h1>
    <div class="user-info">
        Angemeldet als <span id="trainer-name"></span>
        <button onclick="logout()">Abmelden</button>
    </div>
</header>

<div class="tabs">
    <button class="tab-button aktiv" onclick="tabWechseln('uebersicht', this)">Übersicht</button>
    <button class="tab-button" onclick="tabWechseln('kurse', this)">Kurse</button>
</div>

<!-- ================= TAB: UEBERSICHT ================= -->
<div id="tab-uebersicht" class="tab-inhalt sichtbar">
    <div class="kachel-reihe">
        <div class="kachel">
            <div class="zahl" id="anzahl-eigene-kurse">-</div>
            <div class="label">Meine Kurse diese Woche</div>
        </div>
        <div class="kachel">
            <div class="zahl" id="max-kurse">-</div>
            <div class="label">Max. erlaubte Kurse</div>
        </div>
        <div class="kachel">
            <div class="zahl" id="mein-typ">-</div>
            <div class="label">Anstellung</div>
        </div>
    </div>

    <h3>Meine Wochenansicht</h3>
    <div class="wochenansicht" id="wochenansicht"></div>
    <div class="legende">
        <span class="legende-punkt kk-gruen"></span> Findet statt
        <span class="legende-punkt kk-gelb"></span> Vertretung
        <span class="legende-punkt kk-rot"></span> Abgesagt
    </div>
</div>

<!-- ================= TAB: KURSE ================= -->
<div id="tab-kurse" class="tab-inhalt">
    <h2>Mein Kursplan</h2>
    <table>
        <thead>
        <tr>
            <th>Kurs</th>
            <th>Wochentag</th>
            <th>Uhrzeit</th>
            <th>Status</th>
            <th>Vertretung</th>
            <th>Aktion</th>
        </tr>
        </thead>
        <tbody id="eigene-kurse-body"></tbody>
    </table>
</div>

<script src="js/trainer.js"></script>
</body>
</html>
